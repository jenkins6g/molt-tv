<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CivicPilot — Reliability Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0c1421; color: #e4ebf3; margin: 0; padding: 24px; }
  h1 { margin: 0 0 4px 0; font-size: 22px; }
  .sub { color: #7e8ba0; font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 1100px; }
  .card { background: #131c2d; border: 1px solid #1f2a40; border-radius: 8px; padding: 18px; }
  .stat { font-size: 32px; font-weight: 700; color: #62e5a0; }
  .stat.alt { color: #ffd86b; }
  .stat.bad { color: #ff7676; }
  .label { font-size: 12px; color: #7e8ba0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  canvas { max-height: 220px; }
</style>
</head>
<body>
  <h1>CivicPilot — Reliability Dashboard</h1>
  <div class="sub">Live metrics · polled every 2s</div>

  <div class="grid">
    <div class="card">
      <div class="label">Pass rate</div>
      <div class="stat" id="passRate">—</div>
    </div>
    <div class="card">
      <div class="label">Total calls</div>
      <div class="stat alt" id="totalCalls">—</div>
    </div>
    <div class="card">
      <div class="label">Latency p50 / p95 (ms)</div>
      <div class="stat" id="latency">— / —</div>
    </div>
    <div class="card">
      <div class="label">Failure modes</div>
      <canvas id="failChart"></canvas>
    </div>
  </div>

<script>
let chart;
async function tick() {
  try {
    const r = await fetch('/api/metrics');
    const m = await r.json();
    document.getElementById('passRate').textContent = (m.pass_rate * 100).toFixed(0) + '%';
    document.getElementById('totalCalls').textContent = m.total_calls;
    document.getElementById('latency').textContent =
      Math.round(m.latency_p50_avg_ms) + ' / ' + Math.round(m.latency_p95_avg_ms);

    const modes = m.failure_modes || {};
    const labels = Object.keys(modes);
    const values = Object.values(modes);
    if (!chart) {
      chart = new Chart(document.getElementById('failChart'), {
        type: 'bar',
        data: { labels, datasets: [{ label: 'count', data: values, backgroundColor: '#ff7676' }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#7e8ba0' } }, x: { ticks: { color: '#7e8ba0' } } } }
      });
    } else {
      chart.data.labels = labels;
      chart.data.datasets[0].data = values;
      chart.update();
    }
  } catch (e) { console.error(e); }
}
tick();
setInterval(tick, 2000);
</script>
</body>
</html>
