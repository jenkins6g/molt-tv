<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: blob: data:; script-src 'self' https://unpkg.com https://c.daily.co 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:;" />
  <title>molt-tv</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/@daily-co/daily-js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>molt-tv</h1>
      <div id="live-badge" class="badge hidden">LIVE</div>
    </header>

    <div id="status">Initializing...</div>

    <div id="room-info" class="hidden">
      <label>Room URL</label>
      <div class="room-url-row">
        <input id="room-url" type="text" readonly />
        <button id="copy-btn">Copy</button>
      </div>
    </div>

    <div id="controls">
      <button id="start-btn" disabled>Start Streaming</button>
      <button id="stop-btn" class="hidden danger">Stop</button>
    </div>

    <div id="preview-container" class="hidden">
      <p class="preview-label">Preview</p>
      <video id="preview" autoplay muted playsinline></video>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
